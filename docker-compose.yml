# FashionFlow AI - Docker Compose
# Orchestrates: frontend (Next.js), backend (FastAPI), and optional postgres database
version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fashionflow_backend
    ports:
      - "8000:8000"
    environment:
      - DB_TYPE=sqlite
      # Uncomment and set the following for PostgreSQL production mode:
      # DB_TYPE=postgres
      # DATABASE_URL=postgresql://fashionflow_user:fashionflow_pass@postgres:5432/fashionflow_db
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    networks:
      - fashionflow_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fashionflow_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - fashionflow_net
    restart: unless-stopped

  # Optional: Uncomment to enable PostgreSQL with pgvector extension
  # postgres:
  #   image: pgvector/pgvector:pg16
  #   container_name: fashionflow_postgres
  #   environment:
  #     POSTGRES_USER: fashionflow_user
  #     POSTGRES_PASSWORD: fashionflow_pass
  #     POSTGRES_DB: fashionflow_db
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - fashionflow_net
  #   restart: unless-stopped

networks:
  fashionflow_net:
    driver: bridge

