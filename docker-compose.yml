# FashionFlow AI - Docker Compose (Default PostgreSQL + pgvector Enabled)
version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fashionflow_app
    ports:
      - "3000:3000"
      - "8000:8000"
    environment:
      - DB_TYPE=postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=fashionflow_db
    depends_on:
      - postgres
    volumes:
      - ./data:/app/data
    networks:
      - fashionflow_net
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: fashionflow_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fashionflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fashionflow_net
    restart: unless-stopped

networks:
  fashionflow_net:
    driver: bridge

volumes:
  postgres_data:
